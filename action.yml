name: 'Unslop'
description: 'Non-LLM code intelligence — scan for bugs, vulns, and leaked secrets. Offline, deterministic, SARIF out.'
author: 'Cognitive Industries'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  path:
    description: 'Path to scan.'
    required: false
    default: '.'
  engines:
    description: 'Which scans to run: any of scan,secrets,quality (comma-separated).'
    required: false
    default: 'scan,secrets'
  format:
    description: 'Report format: text | json | sarif.'
    required: false
    default: 'sarif'
  output:
    description: 'Where to write the report.'
    required: false
    default: 'unslop.sarif'
  fail-on:
    description: 'Fail the job on this severity or above (critical|high|medium|low|none). Team+ license required to gate CI.'
    required: false
    default: 'none'
  license:
    description: 'Contents of an Unslop license file. Pass the secrets.UNSLOP_LICENSE secret. Free tier if omitted.'
    required: false
    default: ''
  version:
    description: 'Unslop version to install (e.g. v0.1.0) or "latest".'
    required: false
    default: 'latest'
  app-upload:
    description: 'Upload SARIF + run metadata to the Unslop GitHub App backend for inline PR comments, a checks gate, and dashboard sync (requires the App installed + upload-token). Leave false for local-only mode.'
    required: false
    default: 'false'
  app-endpoint:
    description: 'Unslop GitHub App API base (used when app-upload is true).'
    required: false
    default: 'https://api.cognitive-industries.org'
  upload-token:
    description: 'Per-installation upload token for the Unslop App. Pass the secrets.UNSLOP_UPLOAD_TOKEN secret. Issued when you link the installation to your Unslop plan.'
    required: false
    default: ''

outputs:
  report:
    description: 'Path to the generated report.'
    value: ${{ steps.run.outputs.report }}
  findings:
    description: 'Total number of findings.'
    value: ${{ steps.run.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Install unslop
      shell: bash
      run: |
        set -euo pipefail
        # Run the installer bundled with the action rather than fetching it over
        # the marketing domain: Cloudflare bot protection 403s that host from CI
        # IPs. The script downloads the binary from GitHub Releases, which CI can
        # always reach.
        UNSLOP_PREFIX="$HOME/.local/bin" UNSLOP_VERSION="${{ inputs.version }}" sh "$GITHUB_ACTION_PATH/install.sh"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Activate license
      if: inputs.license != ''
      shell: bash
      run: |
        printf '%s' '${{ inputs.license }}' > "$RUNNER_TEMP/unslop.license.json"
        echo "UNSLOP_LICENSE=$RUNNER_TEMP/unslop.license.json" >> "$GITHUB_ENV"

    - name: Run unslop
      id: run
      shell: bash
      run: |
        set -uo pipefail   # not -e: we capture each engine's exit code ourselves
        report="${{ inputs.output }}"
        fmt="${{ inputs.format }}"
        total=0
        gate_rc=0
        IFS=',' read -ra ENGINES <<< "${{ inputs.engines }}"
        for e in "${ENGINES[@]}"; do
          e="$(echo "$e" | xargs)"
          out="${e}.${fmt}"
          echo "::group::unslop $e"
          unslop "$e" "${{ inputs.path }}" \
            --format "$fmt" --output "$out" \
            ${{ inputs.fail-on != 'none' && format('--fail-on {0}', inputs.fail-on) || '' }}
          rc=$?
          echo "::endgroup::"
          # A non-zero exit means this engine hit the --fail-on threshold (only
          # emitted when the license permits CI gating; otherwise unslop exits 0).
          if [ "$rc" -ne 0 ]; then gate_rc="$rc"; fi
          # Count findings from this engine's report (best effort, format-aware).
          n="$(python3 "$GITHUB_ACTION_PATH/count_findings.py" "$out" "$fmt" 2>/dev/null || echo 0)"
          total=$((total + ${n:-0}))
        done
        # merge is a no-op for a single engine; expose the first report
        first="$(echo "${ENGINES[0]}" | xargs).${fmt}"
        cp "$first" "$report" 2>/dev/null || true
        {
          echo "report=$report"
          echo "findings=$total"
          echo "gate=$gate_rc"
        } >> "$GITHUB_OUTPUT"
        echo "unslop: $total finding(s) across [${{ inputs.engines }}]."

    - name: Upload SARIF to code scanning
      if: inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.run.outputs.report }}
      continue-on-error: true

    - name: Upload to Unslop App
      # Best-effort: posts the merged SARIF + run metadata (including the --fail-on
      # policy the App enforces per your plan) to the Unslop GitHub App backend.
      # The App decides gating/comments/SARIF-upload server-side by tier, so this
      # step never fails the job — the local `--fail-on` gate below still applies.
      if: inputs.app-upload == 'true' && inputs.upload-token != '' && inputs.format == 'sarif'
      shell: bash
      continue-on-error: true
      env:
        UNSLOP_APP_ENDPOINT: ${{ inputs.app-endpoint }}
        UNSLOP_UPLOAD_TOKEN: ${{ inputs.upload-token }}
        UNSLOP_ENGINES: ${{ inputs.engines }}
        UNSLOP_FAIL_ON: ${{ inputs.fail-on }}
      run: python3 "$GITHUB_ACTION_PATH/upload_results.py"

    - name: Enforce fail-on gate
      # Runs after the SARIF upload so findings are still reported when the gate
      # trips. `gate` is non-zero only when an engine exceeded --fail-on AND the
      # license permits CI merge-gating (Team+); otherwise unslop exited 0.
      if: steps.run.outputs.gate != '0' && steps.run.outputs.gate != ''
      shell: bash
      run: |
        echo "::error::unslop: findings at or above the '${{ inputs.fail-on }}' threshold."
        exit 1
